name: Shadow Paper Trader
# schedule/workflow_run desactivados 2026-07-01: duplicaba shadow_predict.py
# + shadow_resolve.py del fast loop del VPS (que corre cada ~20-60s con
# datos Binance directos desde IP finlandesa), compitiendo por el mismo
# git push a data/shadow/ en main. Desde que el live está activo el VPS
# pushea mucho más seguido → 68% de fallos en los últimos 3 días (git
# push rejected). Además Binance bloquea (451) las IPs de los runners de
# GitHub Actions, así que cuando SÍ tenía éxito escribía con datos
# degradados (Kraken fallback) en el mismo results.csv que usa el
# postmortem para IC — contaminaba la señal de aprendizaje. Se deja
# workflow_dispatch por si hace falta correrlo manual algún día.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  shadow:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch Binance klines
        run: python fetch_binance_klines.py

      - name: Run predict
        run: python shadow_predict.py

      - name: Run resolve
        run: python shadow_resolve.py

      - name: Generate Excel report
        run: python generate_report.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "shadow: predict+resolve+report $(date -u +%Y-%m-%dT%H:%MZ)"
            git pull --rebase --autostash || true
            git push
          fi
